<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #111; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { border: 2px solid #ff007f; background-color: #1a1a1a; padding: 30px; border-radius: 8px; width: 100%; max-width: 400px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="text-uppercase fw-bold mb-4">Görner <span class="text-magenta" style="color:#ff007f;">CRM</span> Admin</h3>
        <div id="alertBox" class="alert alert-danger d-none"></div>
        <div class="mb-3 text-start">
            <label class="form-label small text-white-50">Benutzername</label>
            <input type="text" id="username" class="form-control bg-dark text-white border-secondary">
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small text-white-50">Passwort</label>
            <input type="password" id="password" class="form-control bg-dark text-white border-secondary">
        </div>
        <button onclick="performLogin()" class="btn w-100 fw-bold text-uppercase" style="background-color:#ff007f; color:#fff;">Anmelden</button>
    </div>

    <script>
        function performLogin() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            google.script.run.withSuccessHandler(function(res) {
                if(res.success) {
                    window.location.href = "<?!= ScriptApp.getService().getUrl() ?>?page=dashboard";
                } else {
                    const ab = document.getElementById("alertBox");
                    ab.textContent = res.message;
                    ab.classList.remove("d-none");
                }
            }).checkAuthentication(u, p);
        }
    </script>
</body>
</html>
