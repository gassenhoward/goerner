<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung | CRM Admin-Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-color: #f8fafc; 
            color: #0f172a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        }
        .login-card { 
            border: 1px solid #cbd5e1; 
            background-color: #ffffff; 
            padding: 35px; 
            border-radius: 8px; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); 
        }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h3 class="fw-bold mb-4">Görner <span style="color:#e60072;">CRM</span> Admin</h3>
        
        <div id="alertBox" class="alert alert-danger d-none text-start small"></div>
        
        <div class="mb-3 text-start">
            <label class="form-label small text-secondary fw-bold">Benutzername</label>
            <input type="text" id="username" class="form-control border-secondary" autocomplete="username">
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small text-secondary fw-bold">Passwort</label>
            <input type="password" id="password" class="form-control border-secondary" autocomplete="current-password">
        </div>
        <button type="button" onclick="performLogin()" id="loginBtn" class="btn w-100 fw-bold text-uppercase" style="background-color:#e60072; color:#fff; border:none; padding: 10px;">Anmelden</button>
    </div>

    <script>
        function performLogin() {
            const u = document.getElementById("username").value.trim();
            const p = document.getElementById("password").value.trim();
            const ab = document.getElementById("alertBox");
            const btn = document.getElementById("loginBtn");

            ab.classList.add("d-none");

            if (!u || !p) {
                ab.textContent = "Bitte Benutzername und Passwort eingeben.";
                ab.classList.remove("d-none");
                return;
            }

            btn.disabled = true;
            btn.textContent = "Prüfe Zugangsdaten...";

            google.script.run
                .withSuccessHandler(function(res) {
                    btn.disabled = false;
                    btn.textContent = "Anmelden";
                    if (res && res.success) {
                        const baseUrl = "<?!= ScriptApp.getService().getUrl() ?>";
                        window.location.href = baseUrl + "?page=dashboard";
                    } else {
                        ab.textContent = (res && res.message) ? res.message : "Zugangsdaten ungültig.";
                        ab.classList.remove("d-none");
                    }
                })
                .withFailureHandler(function(err) {
                    btn.disabled = false;
                    btn.textContent = "Anmelden";
                    ab.textContent = "Server-Fehler: " + (err.message || err.toString());
                    ab.classList.remove("d-none");
                })
                .checkAuthentication(u, p);
        }
    </script>
</body>
</html>
